<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burmaldun | Terminal</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .terminal { border: 2px solid #00ff41; padding: 25px; box-shadow: 0 0 20px #00ff41; width: 300px; text-align: center; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 85%; margin: 15px 0; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; width: 94%; cursor: pointer; font-weight: bold; }
        button:disabled { background: #222; color: #555; }
        .status { font-size: 0.8em; margin-top: 15px; color: #008f11; height: 1.2em; }
    </style>
</head>
<body>
    <div class="terminal">
        <h2>BURMALDUN</h2>
        <input type="text" id="msg" placeholder="..." autocomplete="off">
        <button id="btn" onclick="send()">ОТПРАВИТЬ</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        let cooldown = false;
        async function send() {
            if (cooldown) return;
            const input = document.getElementById('msg');
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const text = input.value.trim();

            if (!text) return;

            const url = `https://polished-unit-9b73.fvita2860.workers.dev/?text=${encodeURIComponent(text)}`;
            cooldown = true;
            btn.disabled = true;
            status.innerText = "Processing...";

            try {
                const res = await fetch(url);
                if (res.ok) {
                    status.innerText = "Done";
                    input.value = "";
                    let t = 30;
                    const i = setInterval(() => {
                        btn.innerText = t--;
                        if (t < 0) {
                            clearInterval(i);
                            btn.disabled = false;
                            btn.innerText = "ОТПРАВИТЬ";
                            cooldown = false;
                            status.innerText = "";
                        }
                    }, 1000);
                } else {
                    status.innerText = "Error";
                    reset(btn, status);
                }
            } catch (e) {
                status.innerText = "Network Error";
                reset(btn, status);
            }
        }

        function reset(btn, status) {
            btn.disabled = false;
            btn.innerText = "ОТПРАВИТЬ";
            cooldown = false;
        }
    </script>
</body>
</html>
