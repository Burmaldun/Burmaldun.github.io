<script>
    // Используем sessionStorage, чтобы КД не сбрасывался даже при обычном обновлении страницы
    let cooldownActive = false;

    async function sendToTG() {
        const btn = document.querySelector('button');
        const logBox = document.getElementById('log_box');
        const userInput = document.getElementById('user_msg');
        
        // 1. Жесткая проверка КД
        if (cooldownActive || btn.disabled) {
            console.log("Кулдаун еще активен");
            return;
        }

        const text = userInput.value.trim();
        if (!text) {
            logBox.innerText = "> Введите текст!";
            return;
        }

        const token = "8202292177:AAHK2CR4lp5wbEeMRU1otQdEXr81smOOTdE"; 
        const chat_id = "6849614809"; 
        
        // 2. Включаем блокировку СРАЗУ (до запроса)
        cooldownActive = true;
        btn.disabled = true;
        btn.style.background = "#555";
        btn.style.color = "#000";
        btn.style.cursor = "not-allowed";
        
        logBox.innerText = "> Sending data...";

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`;

        try {
            const response = await fetch(url);
            if (response.ok) {
                logBox.innerText = "> Доставлено! КД 30 сек...";
                userInput.value = "";
                startTimer(btn, logBox);
            } else {
                logBox.innerText = "> Ошибка API. Сброс...";
                resetBtn(btn, logBox);
            }
        } catch (e) {
            logBox.innerText = "> Ошибка сети. Сброс...";
            resetBtn(btn, logBox);
        }
    }

    function startTimer(btn, logBox) {
        let timeLeft = 30;
        btn.innerText = `ЖДАТЬ ${timeLeft}с`;

        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                btn.innerText = `ЖДАТЬ ${timeLeft}с`;
            } else {
                clearInterval(timer);
                resetBtn(btn, logBox);
            }
        }, 1000);
    }

    function resetBtn(btn, logBox) {
        btn.disabled = false;
        btn.innerText = "ОТПРАВИТЬ";
        btn.style.background = "#00ff41";
        btn.style.color = "#000";
        btn.style.cursor = "pointer";
        cooldownActive = false;
        logBox.innerText = "> System ready...";
    }

    // Принудительный сброс кнопки при загрузке страницы (помогает на мобилах)
    window.onload = () => {
        const btn = document.querySelector('button');
        const logBox = document.getElementById('log_box');
        resetBtn(btn, logBox);
    };
</script>
