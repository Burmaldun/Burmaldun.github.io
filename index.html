<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burmaldun | Анонимно</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 10px; color: #00ff41; letter-spacing: 1px; }
        p { color: #888; font-size: 0.9em; margin-bottom: 20px; }
        textarea { background: #222; border: 1px solid #444; color: #fff; padding: 15px; width: 90%; border-radius: 12px; resize: none; outline: none; margin-bottom: 15px; font-family: inherit; }
        button { background: #00ff41; color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #333; color: #777; cursor: not-allowed; }
        #status { font-size: 0.8em; margin-top: 15px; color: #00ff41; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Burmaldun</h2>
        <p>Напишите что-нибудь, и это сообщение увидит Burmalda</p>
        
        <textarea id="msg" rows="4" placeholder="Текст сообщения..."></textarea>
        
        <button id="btn" onclick="send()">ОТПРАВИТЬ</button>
        <div id="status"></div>
    </div>

    <script>
        let cooldown = false;
        async function send() {
            if (cooldown) return;
            const input = document.getElementById('msg');
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const text = input.value.trim();

            if (!text) return;

            const proxy = "https://polished-unit-9b73.fvita2860.workers.dev";
            const url = `${proxy}/?text=${encodeURIComponent(text)}`;

            cooldown = true;
            btn.disabled = true;
            status.innerText = "Отправка...";

            try {
                const res = await fetch(url);
                if (res.ok) {
                    status.innerText = "Сообщение доставлено!";
                    input.value = "";
                    let t = 30;
                    const i = setInterval(() => {
                        btn.innerText = `Ждать ${t--}с`;
                        if (t < 0) {
                            clearInterval(i);
                            btn.disabled = false;
                            btn.innerText = "ОТПРАВИТЬ";
                            cooldown = false;
                            status.innerText = "";
                        }
                    }, 1000);
                } else {
                    status.innerText = "Ошибка сервера";
                    reset();
                }
            } catch (e) {
                status.innerText = "Ошибка сети";
                reset();
            }
        }

        function reset() {
            const btn = document.getElementById('btn');
            btn.disabled = false;
            cooldown = false;
        }
    </script>
</body>
</html>
